name: Update OSRS Wiki Data

on:
  schedule:
    # Run every Monday at 06:00 UTC (after weekly OSRS game updates)
    - cron: '0 6 * * 1'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch quest data from OSRS Wiki
        run: npx tsx scripts/fetch-quest-reqs.ts

      - name: Fetch item data from OSRS Wiki
        run: npm run fetch:items

      - name: Format wiki data
        run: npx prettier --write src/engine/quest-data.json src/engine/item-data.json

      - name: Commit updated wiki data
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/engine/quest-data.json src/engine/item-data.json
          if git diff --staged --quiet; then
            echo "No wiki data changes to commit."
            exit 0
          fi
          git commit -m "chore: update quest and item data from OSRS Wiki"
          git push
